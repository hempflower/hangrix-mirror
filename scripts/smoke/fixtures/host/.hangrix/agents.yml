# smoke host yaml. Four roles wire the dispatcher → backend →
# reviewer → maintainer chain. All roles share the same minimal ubuntu
# image baked from scripts/smoke/agent-image/Dockerfile.
#
# The model name and `llm.model` MUST match a model registered on the
# LLM provider (see scripts/smoke/run.sh; default `deepseek-v4-pro`).
version: 1

container:
  image: hangrix-smoke-agent:latest
  env:
    GIT_TERMINAL_PROMPT: "0"

llm:
  model: deepseek-v4-pro

roles:
  dispatcher:
    agent: smoke/dispatcher@v0.1.0
    triggers: [issue.opened]
    can: [issue_read, issue_comment, roster_list]
    mention_by: collaborators

  backend:
    agent: smoke/backend@v0.1.0
    triggers: [issue.comment.mentioned]
    can: [issue_read, issue_comment, read, write, edit, glob, grep, bash]
    mention_by: collaborators

  reviewer:
    agent: smoke/reviewer@v0.1.0
    triggers: [commit.pushed]
    can: [issue_read, issue_diff, issue_comment, issue_review_vote]
    mention_by: collaborators

  maintainer:
    agent: smoke/maintainer@v0.1.0
    triggers: [review_vote.posted]
    can: [issue_read, issue_diff, issue_checks, issue_merge, issue_close]
    mention_by: owner
