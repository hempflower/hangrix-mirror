# Release workflow: triggered by a semver-shaped tag push (e.g. v0.4.0).
# Cross-compiles every Go binary in the workspace for linux/amd64 and
# linux/arm64, creates a draft release via the platform API, uploads all
# dist assets, and publishes the release.
#
# Linux-only on purpose: hangrix-agent runs inside a docker container,
# so non-linux agent builds are dead weight. hangrix and hangrix-runner
# are likewise intended for linux deploys.
#
# The embed chain (build-embed-binaries.mjs → copy-web-dist.mjs) is the
# same single source of truth as .github/workflows/release.yml.
version: 1
name: release
on:
  repo.push_tag:
    tags: ['v*']

jobs:
  build:
    timeout_minutes: 30
    steps:
      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Build the static web bundle once. copy-web-dist.mjs (run later)
      # stages it under apps/hangrix/internal/web/dist/ for embedding.
      - name: Generate web bundle
        run: pnpm --filter web run generate

      # Build the embed payload exactly once: hangrix-agent for each
      # supported linux arch, then hangrix-runner for the same arch
      # (with the agent embedded inside it).
      - name: Build embed payload
        run: node apps/hangrix/scripts/build-embed-binaries.mjs

      # Surface the per-arch runner binaries as top-level release
      # artefacts too — operators may want to install a runner via
      # wget rather than the curl|sh installer.
      - name: Stage runner binaries for release
        run: |
          mkdir -p dist
          cp apps/hangrix/internal/modules/runner/binaries/payload/hangrix-runner_* dist/

      # Stage the web bundle inside the server's embed dir, then
      # cross-compile the server for each linux arch.
      - name: Copy web dist into server embed
        run: node apps/hangrix/scripts/copy-web-dist.mjs

      - name: Build hangrix (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        dir: apps/hangrix
        run: |
          go build -trimpath -ldflags='-s -w' \
            -o "../../dist/hangrix_linux_amd64" \
            ./cmd/hangrix

      - name: Build hangrix (linux/arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: '0'
        dir: apps/hangrix
        run: |
          go build -trimpath -ldflags='-s -w' \
            -o "../../dist/hangrix_linux_arm64" \
            ./cmd/hangrix

      # List the staged assets and surface the triggering tag as a step
      # output, so the built-in release step can reference it. `with.tag`
      # only interpolates ${{ steps.<id>.outputs.<key> }} — not shell env —
      # so the tag has to ride through a step output.
      - id: meta
        name: Collect release metadata
        run: |
          ls -la dist/
          echo "tag=${HANGRIX_TAG}" >> "$HANGRIX_STEP_OUTPUT_FILE"

      # Built-in release step: creates the release via the platform API and
      # uploads the assets directly (no curl). draft:false auto-publishes.
      - name: Create and publish release
        type: release
        with:
          tag: ${{ steps.meta.outputs.tag }}
          draft: false
          assets:
            - dist/hangrix_linux_amd64
            - dist/hangrix_linux_arm64
            - dist/hangrix-runner_linux_amd64
            - dist/hangrix-runner_linux_arm64
