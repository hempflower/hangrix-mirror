# Hangrix host-repo agent team.
#
# This repo IS the Hangrix platform — the parser that enforces this file
# lives at apps/hangrix/internal/agentsconfig, the schema at
# docs/agents.schema.json, and the reference at docs/agent-config.md.
# Changes to the schema MUST be applied here AND in the starter template
# at apps/hangrix/internal/modules/repo/templates/initial/.hangrix/agents.yml.

version: 1

container:
  build:
    dockerfile: .hangrix/agent.Dockerfile
    context: .
  # The image bakes in s6-overlay as PID 1, which auto-starts postgres
  # + redis. Leaving entrypoint unset would make the runner override
  # PID 1 with `sleep infinity` and the services would never come up.
  entrypoint: ["/init"]
  env:
    NODE_ENV: development
  volumes:
    - { name: pnpm-store, mount: /workspace/.pnpm-store }
    - { name: go-mod, mount: /go/pkg/mod }
    - { name: go-build, mount: /home/vscode/.cache/go-build }
    - { name: npx-cache, mount: /home/vscode/.npm/_npx }

llm:
  model: deepseek-v4-pro
  reasoning_effort: high
  max_context_tokens: 1000000
  max_output_tokens: 256000

# Per-contribution review gate (docs/contribution-branches.md). Each rule maps
# a contribution branch's changed paths to the reviewer roles that must vote on
# it; a branch collects the union of every matching rule's reviewers. A branch
# leaves `pending` only once all its required reviewers have voted — approve/
# abstain → approved, any reject → rejected. `fallback` reviews branches that
# match no rule (kept as the maintainer so nothing ever lands unreviewed).
# Only roles that can cast votes may be listed — a role can vote when it has
# `permission: write` and does not blacklist issue_review_vote in its `not:`.
reviewers:
  rules:
    - paths: ["apps/hangrix/**", "pkg/**", "go.work", "go.work.sum"]
      reviewers: [server-reviewer, tester]
    - paths: ["apps/hangrix-agent/**", "apps/hangrix-runner/**"]
      reviewers: [runtime-reviewer, tester]
    - paths: ["apps/web/**"]
      reviewers: [web-reviewer, tester]
  fallback: [maintainer]

roles:
  maintainer:
    triggers:
      issue.opened: {}
      issue.comment: {}
      review_vote.posted: {}
    # The maintainer orchestrates the issue: it merges, closes, applies
    # contributions, recovers sessions and manages releases — so it keeps
    # full write access with no tool blacklist.
    permission: write
    prompt_file: .hangrix/prompts/maintainer.md
    llm:
      model: deepseek-v4-flash
      reasoning_effort: max   # max_*_tokens inherit from team
  # Access model (GitHub-style): `permission:` is the coarse, server-
  # enforced repo level — `read` allows read-only API calls, `write` adds
  # mutations. Fine-grained capability is the `not:` tool blacklist:
  # listed tools are hidden from the agent's LLM tool schema entirely
  # (enforced agent-side). Most roles are `write` and share the
  # `&dangerous` blacklist below — the irreversible / cross-role
  # operations only the maintainer should perform. Per-role behaviour is
  # otherwise shaped by the prompt, not by a tool whitelist.
  product-designer:
    triggers:
      issue.comment:
        mentioned_only: true
    permission: write
    not: &dangerous
      - issue_merge
      - issue_close
      - contribution_apply
      - session_recover
      - release_create
      - release_update
      - release_delete
      - release_publish
      - release_upload_asset
    prompt_file: .hangrix/prompts/product-designer.md
    llm:
      model: gpt-5.4

  architecture-designer:
    triggers:
      issue.comment:
        mentioned_only: true
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/architecture-designer.md
    llm:
      model: gpt-5.4


  tester:
    triggers:
      commit.pushed:
        paths_ignore:
          - "**/*.md"
          - "**/testdata/**"
          - ".hangrix/**"
          - "apps/hangrix/internal/web/dist/**"
      issue.comment:
        mentioned_only: true
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/tester.md
    llm:
      model: deepseek-v4-flash

  server:
    triggers:
      issue.comment:
        mentioned_only: true
    scope:
      paths:
        - "apps/hangrix/**"
        - "pkg/**"
        - "go.work"
        - "go.work.sum"
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/server.md

  server-reviewer:
    triggers:
      commit.pushed:
        paths:
          - "apps/hangrix/**"
          - "pkg/**"
        paths_ignore:
          - "apps/hangrix/internal/web/dist/**"
          - "**/*db/**"
      issue.comment:
        mentioned_only: true
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/server-reviewer.md
    llm:
      model: gpt-5.4
      reasoning_effort: high

  runtime:
    triggers:
      issue.comment:
        mentioned_only: true
    scope:
      paths:
        - "apps/hangrix-agent/**"
        - "apps/hangrix-runner/**"
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/runtime.md

  runtime-reviewer:
    triggers:
      commit.pushed:
        paths:
          - "apps/hangrix-agent/**"
          - "apps/hangrix-runner/**"
      issue.comment:
        mentioned_only: true
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/runtime-reviewer.md
    llm:
      model: gpt-5.4
      reasoning_effort: high

  web:
    triggers:
      issue.comment:
        mentioned_only: true
    mcp: [playwright]   # browser automation for frontend verification
    scope:
      paths:
        - "apps/web/**"
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/web.md

  web-reviewer:
    triggers:
      commit.pushed:
        paths:
          - "apps/web/**"
        paths_ignore:
          - "apps/web/dist/**"
          - "apps/web/.output/**"
          - "apps/web/.nuxt/**"
      issue.comment:
        mentioned_only: true
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/web-reviewer.md
    llm:
      model: gpt-5.4
      reasoning_effort: high

  web-copy-lint:
    triggers:
      commit.pushed:
        paths:
          - "apps/web/**"
        paths_ignore:
          - "apps/web/dist/**"
          - "apps/web/.output/**"
          - "apps/web/.nuxt/**"
      issue.comment:
        mentioned_only: true
    permission: write
    not: *dangerous
    prompt_file: .hangrix/prompts/web-copy-lint.md
    llm:
      model: deepseek-v4-flash
      reasoning_effort: low

