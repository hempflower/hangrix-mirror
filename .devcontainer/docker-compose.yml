version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/go:1.26-bookworm
    volumes:
      - ../..:/workspaces:cached
      # docker-outside-of-docker: host's docker socket so `docker` inside
      # the devcontainer talks to the host daemon. Containers spawned from
      # here are siblings on the host, not nested children.
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspaces/${localWorkspaceFolderBasename}
    command: sleep infinity
    networks:
      - hangrix

  postgres:
    image: postgres:17-alpine
    container_name: hangrix-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: hangrix
      POSTGRES_PASSWORD: hangrix
      POSTGRES_DB: hangrix
    ports:
      - "5432:5432"
    volumes:
      - hangrix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hangrix -d hangrix"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hangrix

  redis:
    image: redis:7-alpine
    container_name: hangrix-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - hangrix_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hangrix

volumes:
  hangrix_pgdata:
  hangrix_redisdata:

networks:
  hangrix:
