root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./bin/hangrix.exe ./cmd/hangrix"
bin = "bin/hangrix.exe"
include_ext = ["go", "yaml"]
include_dir = ["cmd", "conf", "internal", "../../pkg"]
exclude_dir = ["bin", "tmp", "scripts", "internal/web/dist"]
exclude_file = ["internal/web/dist/.gitkeep"]
exclude_regex = ["_test\\.go"]
delay = 500
stop_on_error = true
log = "build-errors.log"
kill_delay = "2s"
send_interrupt = true

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
