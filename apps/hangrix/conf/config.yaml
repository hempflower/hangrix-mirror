server:
  addr: ":8080"
  # Public base URL for endpoint advertisement (runner bootstrap, agent
  # env injection, future webhooks). Empty defers to the request host —
  # fine for `go run ./cmd/hangrix` in a vanilla dev shell. For
  # docker-compose smoke + production set this explicitly so the value
  # is reachable from the network the agent containers live on.
  url: ""

database:
  dsn: "postgres://hangrix:hangrix@hangrix-postgres-dev:5432/hangrix?sslmode=disable"

redis:
  addr: "hangrix-redis-dev:6379"
  password: ""
  db: 0

auth:
  cookie_name: "hangrix_session"
  cookie_secure: false
  session_ttl: "168h"

storage:
  repos_path: "./data/repos"

llm:
  encryption_key: "wAO53V1ifCfBbm5ZVmjR9haeymmvhIobK4b99+D4Eq8="

runner:
  default_agent_image: "hangrix-smoke-agent:latest"
